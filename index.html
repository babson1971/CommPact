:root{
  --cp-blue:#2d7ff9; --cp-blue-bright:#5aa0ff; --cp-blue-deep:#1f6fe6; --cp-cyan:#38bdf8;
  --navy:#0a2748; --navy-2:#0f2f57; --ink:#16243a; --muted:#5b6b82; --line:#e3e9f2;
  --bg:#f4f7fc; --card:#ffffff; --good:#15803d; --good-bg:#dcfce7; --warn:#b45309; --warn-bg:#fef3c7;
  --bad:#b91c1c; --bad-bg:#fee2e2; --radius:14px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--cp-blue-deep);text-decoration:none}
button{font-family:inherit}
.hidden{display:none!important}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--navy),var(--navy-2));color:#cdd9ec;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.brand-mark{flex:0 0 auto}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-.02em;color:#fff}
.brand-name small{display:block;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--cp-blue-bright);margin-top:1px}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:#6f86a8;margin:16px 8px 6px;font-weight:700}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:#cdd9ec;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:2px}
.nav a .dot{width:7px;height:7px;border-radius:50%;background:#46597a}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:rgba(45,127,249,.18);color:#fff}
.nav a.active .dot{background:var(--cp-cyan)}
.sidebar-foot{margin-top:auto;font-size:11px;color:#6f86a8;padding:10px 8px;line-height:1.5}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}
.topbar .crumbs{font-size:14px;color:var(--muted)}
.topbar .crumbs b{color:var(--ink)}
.topbar-right{display:flex;align-items:center;gap:14px}
.role-pick{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.role-pick select{border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13px;font-weight:700;color:var(--ink);background:#fff}
.role-pick.demo-id select{border-color:var(--cp-blue);background:#f0f7ff}
.role-pick.demo-id span{color:var(--cp-blue);font-weight:700}
.who{display:flex;align-items:center;gap:9px}
.who .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--cp-blue-bright),var(--cp-cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.content{padding:24px;max-width:1180px;width:100%}

/* ---------- Typography / headers ---------- */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--navy);margin:0}
.page-sub{font-size:14px;color:var(--muted);margin:4px 0 0}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:#fff;color:#33425a;font-weight:700;font-size:13.5px;padding:9px 14px;border-radius:10px;cursor:pointer;transition:.12s;white-space:nowrap}
.btn:hover{border-color:var(--cp-blue-bright);color:var(--cp-blue-deep);background:#f2f7ff}
.btn.primary{background:linear-gradient(180deg,var(--cp-blue-bright),var(--cp-blue));border-color:var(--cp-blue);color:#fff}
.btn.primary:hover{filter:brightness(1.05);color:#fff}
.btn.good{background:var(--good-bg);border-color:#86efac;color:var(--good)}
.btn.warn{background:var(--warn-bg);border-color:#fcd34d;color:var(--warn)}
.btn.danger{background:var(--bad-bg);border-color:#fca5a5;color:var(--bad)}
.btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;box-shadow:0 1px 2px rgba(15,30,60,.04)}
.card-h{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:15px 18px;background:#f8fbff;border-bottom:1px solid var(--line)}
.card-h h3{margin:0;font-size:16px;font-weight:800;color:var(--navy)}
.card-h p{margin:3px 0 0;font-size:13px;color:var(--muted);line-height:1.5}
.card-b{padding:18px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.gauto{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
@media(max-width:900px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;height:100vh;transform:translateX(-110%);transition:transform .22s ease;z-index:60;box-shadow:0 12px 40px rgba(6,16,33,.35)}
  .app.nav-open .sidebar{transform:translateX(0)}
  .nav-backdrop{position:fixed;inset:0;background:rgba(8,20,40,.5);z-index:55}
  .hamburger{display:flex}
  .topbar{padding:0 14px;gap:6px}
  .topbar-right{gap:8px}
  .role-pick>span{display:none}
  .content{padding:16px}
}
@media(max-width:560px){
  .page-title{font-size:21px}
  .topbar-right .who{display:none}
  .role-pick select{padding:6px 8px;max-width:120px}
}

/* ---------- KPI ---------- */
.kpi{background:#f4f8ff;border:1px solid #dbe7fb;border-radius:12px;padding:14px 16px}
.kpi .v{font-size:25px;font-weight:900;color:var(--navy);line-height:1;letter-spacing:-.02em}
.kpi .l{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:7px}
.kpi .s{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}

/* ---------- Pills / badges ---------- */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:800;white-space:nowrap}
.pill.blue{background:#e3eeff;color:var(--cp-blue-deep)}
.pill.green{background:var(--good-bg);color:var(--good)}
.pill.amber{background:var(--warn-bg);color:var(--warn)}
.pill.red{background:var(--bad-bg);color:var(--bad)}
.pill.gray{background:#eef2f7;color:#475569}
.pill.purple{background:#ede9fe;color:#6d28d9}

/* ---------- Tables ---------- */
.tw{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
table.t{width:100%;border-collapse:collapse;font-size:13.5px}
table.t th{background:#f4f8ff;text-align:left;color:#475569;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid #dbe7fb;white-space:nowrap}
table.t td{padding:11px 12px;border-bottom:1px solid #eef2f7;vertical-align:top}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:#fafcff}

/* ---------- Forms ---------- */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.field input,.field select,.field textarea{border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--cp-blue);box-shadow:0 0 0 3px rgba(45,127,249,.14)}
.field small{font-size:11.5px;color:var(--muted)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .full{grid-column:1/-1}
@media(max-width:700px){.fgrid{grid-template-columns:1fr}}
.help{background:#eff4ff;border-left:4px solid var(--cp-blue);border-radius:0 10px 10px 0;padding:11px 14px;color:#13346b;font-size:13.5px;line-height:1.55;margin-bottom:14px}
.note{background:#f8fbff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--muted);line-height:1.55}
.empty{padding:26px;text-align:center;color:var(--muted);border:1.5px dashed var(--line);border-radius:12px;background:#f8fafc}

/* ---------- Progress ---------- */
.bar{height:9px;background:#e7edf6;border-radius:999px;overflow:hidden}
.bar span{display:block;height:100%;background:var(--cp-blue);border-radius:999px}
.bar.green span{background:var(--good)} .bar.amber span{background:var(--warn)} .bar.red span{background:var(--bad)}

/* ---------- Project cards ---------- */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.proj{background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.14s}
.proj:hover{border-color:var(--cp-blue-bright);box-shadow:0 8px 24px rgba(31,111,230,.10);transform:translateY(-2px)}
.proj .name{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-.01em}
.proj .desc{font-size:13px;color:var(--muted);margin:6px 0 14px;line-height:1.5}
.proj .stats{display:flex;gap:18px;border-top:1px solid var(--line);padding-top:12px}
.proj .stat .v{font-size:17px;font-weight:800;color:var(--ink)}
.proj .stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

/* ---------- Detail header ---------- */
.dh{background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.dh .top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
.dh h1{margin:0;font-size:23px;font-weight:800;color:var(--navy);letter-spacing:-.02em}
.dh .meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:var(--muted)}
.dh .meta b{color:var(--ink)}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px;overflow-x:auto}
.tab{padding:11px 15px;font-size:13.5px;font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab:hover{color:var(--cp-blue-deep)}
.tab.active{color:var(--cp-blue-deep);border-bottom-color:var(--cp-blue)}

/* ---------- Logframe ---------- */
.lf-level{border:1.5px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.lf-level-h{display:flex;align-items:center;gap:10px;padding:11px 15px;background:#f4f8ff;border-bottom:1px solid var(--line)}
.lf-level-h .lp{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:999px;color:#fff}
.lp.goal{background:#6d28d9}.lp.outcome{background:var(--cp-blue-deep)}.lp.output{background:var(--cp-cyan)}.lp.activity{background:#0891b2}
.lf-level-h .stmt{font-size:13.5px;color:var(--ink);font-weight:600}
.lf-ind{padding:13px 15px;border-bottom:1px solid #eef2f7}
.lf-ind:last-child{border-bottom:none}
.lf-ind .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.lf-ind .nm{font-weight:700;font-size:14px;color:var(--ink)}
.lf-ind .prog{display:flex;align-items:center;gap:10px;margin-top:9px}
.lf-ind .prog .bar{flex:1}
.lf-meta{display:flex;flex-wrap:wrap;gap:14px;margin-top:9px;font-size:12px;color:var(--muted)}
.lf-meta b{color:var(--ink);font-weight:700}
.toc-chain{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch;margin-top:6px}
.toc-node{flex:1;min-width:150px;background:#f8fbff;border:1px solid var(--line);border-radius:10px;padding:11px}
.toc-node .l{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--cp-blue-deep)}
.toc-node .x{font-size:12.5px;color:var(--ink);margin-top:4px;line-height:1.45}
.toc-arrow{align-self:center;color:#9fb2cc;font-size:20px;font-weight:800}

/* ---------- Timeline / events ---------- */
.ev{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:#f8fbff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
.ev .d{width:9px;height:9px;border-radius:50%;background:var(--cp-blue);margin-top:6px;flex:0 0 auto}
.ev .t{font-weight:700;font-size:13.5px;color:var(--ink)}
.ev .m{font-size:12px;color:var(--muted);margin-top:2px}

/* ---------- Search ---------- */
.search{position:relative;max-width:320px;width:100%}
.search input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px 9px 34px;font-size:14px}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9fb2cc}

/* ---------- Avatars ---------- */
.av-sm{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--cp-blue),var(--cp-blue-deep));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px}

/* ---------- Bars chart ---------- */
.chart{display:flex;align-items:flex-end;gap:12px;height:160px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff,#f8fbff)}
.chart .cbar{flex:1;min-width:26px;background:linear-gradient(180deg,var(--cp-blue-bright),var(--cp-blue));border-radius:6px 6px 0 0;position:relative;cursor:default;transition:filter .12s}
.chart .cbar:hover{filter:brightness(1.08)}

/* ---------- state + persistence ---------- */
var LS_DATA='commpact_demo_v2', LS_ROLE='commpact_role_v1', LS_DORG='commpact_demo_org_v1', LS_DPROJ='commpact_demo_proj_v1';
var DATA, state={role:'HFL', view:'projects', pid:null, tab:'overview', auditOnly:false, demoOrg:null, demoProject:null, navOpen:false};

function load(){
  try{var raw=localStorage.getItem(LS_DATA); DATA = raw?JSON.parse(raw):seed(); if(!Array.isArray(DATA)||!DATA.length)DATA=seed();}catch(e){DATA=seed();}
  try{var r=localStorage.getItem(LS_ROLE); if(r)state.role=normRole(r);}catch(e){}
  try{var o=localStorage.getItem(LS_DORG); if(o)state.demoOrg=o;}catch(e){}
  try{var pj=localStorage.getItem(LS_DPROJ); if(pj)state.demoProject=pj;}catch(e){}
}
function save(){try{localStorage.setItem(LS_DATA,JSON.stringify(DATA));}catch(e){}}
function resetData(){confirmModal({title:'Reset demo data',message:'Reset all demo data to the original seed? This clears your changes.',danger:true,confirmLabel:'Reset',onConfirm:function(){localStorage.removeItem(LS_DATA); load(); render(); toast('Demo data reset.');}});}

/* ---------- audit ---------- */
function logAudit(action,object,oldV,newV){var a=getAudit(); a.unshift({date:today(),time:clock(),user:userName(),role:state.role,action:action,object:object||'',oldValue:oldV==null?'':String(oldV),newValue:newV==null?'':String(newV)}); try{localStorage.setItem('commpact_audit_v1',JSON.stringify(a.slice(0,400)));}catch(e){}}
function getAudit(){try{return JSON.parse(localStorage.getItem('commpact_audit_v1')||'[]');}catch(e){return [];}}

/* ---------- permissions ---------- */
function isHFL(){return state.role==='HFL';}
function isAdmin(){return state.role==='HFL';}
function canManage(){return state.role==='HFL'||state.role==='Partner Admin';}
function canValidate(){return canManage();}
function normRole(r){return ({'Admin':'HFL','HFL Staff':'HFL','Project Lead':'Partner Admin'})[r]||r;}
function userName(){return ({'HFL':'Jordan Vega (HFL)','Partner Admin':'Maria Okonkwo (Partner Admin)','Project Staff':'Sam Doyle (Project Staff)'})[state.role]||state.role;}
function project(){return DATA.find(function(p){return p.id===state.pid;});}
function projectById(id){return DATA.find(function(p){return p.id===id;});}
/* demo identity for role-scoped views */
function allOrgNames(){var set={};DATA.forEach(function(p){(p.orgs||[]).forEach(function(o){set[o.name]=1;});});return Object.keys(set).sort();}
function myOrg(){ if(state.demoOrg&&allOrgNames().indexOf(state.demoOrg)>=0)return state.demoOrg; var a=allOrgNames(); return a.indexOf('La Porte County Food Bank')>=0?'La Porte County Food Bank':(a[0]||''); }
function myProjectId(){ if(state.demoProject&&projectById(state.demoProject))return state.demoProject; return projectById('fresh-plate')?'fresh-plate':(DATA[0]&&DATA[0].id||''); }
function inMyOrg(p){return (p.orgs||[]).some(function(o){return o.name===myOrg();});}
function scopedProjects(){ if(isHFL())return DATA; if(state.role==='Partner Admin')return DATA.filter(inMyOrg); return DATA.filter(function(p){return p.id===myProjectId();}); }
function canSeeProject(p){return scopedProjects().some(function(x){return x.id===p.id;});}
function scopeLabel(){ if(isHFL())return 'Entire portfolio · all partner organizations'; if(state.role==='Partner Admin')return esc(myOrg())+' · your organization\u2019s projects'; return 'Your assigned project'; }

/* ---------- toast ---------- */
function toast(msg,type){var w=$('toast-root'); var t=document.createElement('div'); t.className='toast '+(type||'good'); t.textContent=msg; w.appendChild(t); setTimeout(function(){t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function(){t.remove();},300);},2600);}

/* ---------- modal ---------- */
function modal(title, bodyHTML, footHTML){
  var root=$('modal-root');
  root.innerHTML='<div class="modal-bg" id="modal-bg"><div class="modal"><div class="modal-h"><h3>'+esc(title)+'</h3><button class="modal-x" id="modal-x">&times;</button></div><div class="modal-b">'+bodyHTML+'</div><div class="modal-f">'+(footHTML||'<button class="btn" data-close>Close</button>')+'</div></div></div>';
  $('modal-x').onclick=closeModal;
  $('modal-bg').onclick=function(e){if(e.target.id==='modal-bg')closeModal();};
  root.querySelectorAll('[data-close]').forEach(function(b){b.onclick=closeModal;});
}
function closeModal(){$('modal-root').innerHTML='';}
function confirmModal(opts){
  var foot='<button class="btn" data-close>Cancel</button><button class="btn '+(opts.danger?'danger':'primary')+'" id="modal-confirm">'+esc(opts.confirmLabel||'Confirm')+'</button>';
  modal(opts.title||'Please confirm', '<div class="confirm-msg">'+esc(opts.message||'')+'</div>', foot);
  $('modal-confirm').onclick=function(){ closeModal(); if(opts.onConfirm)opts.onConfirm(); };
}
function promptModal(opts){
  var body=fin(opts.label||'Value','pm-input',opts.value!=null?opts.value:'','',opts.type||'text')+(opts.help?'<div class="note">'+esc(opts.help)+'</div>':'');
  modal(opts.title||'Enter a value', body, '<button class="btn" data-close>Cancel</button><button class="btn primary" id="modal-ok">'+esc(opts.okLabel||'Save')+'</button>');
  setTimeout(function(){var el=$('pm-input'); if(el){try{el.focus();}catch(e){} el.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();$('modal-ok').click();}};}},0);
  $('modal-ok').onclick=function(){ var val=v('pm-input'); closeModal(); if(opts.onSubmit)opts.onSubmit(val); };
}

function navigate(view, pid, tab){
  state.navOpen=false;

}

function statusPill(s){var m={'Active':'green','Planning':'amber','Closed':'gray','Closing':'amber'};return '<span class="pill '+(m[s]||'blue')+'">'+esc(s)+'</span>';}
function indPct(i){var b=+i.baseline||0,t=+i.target||0,c=+i.current||0;if(t===b)return c>=t?100:0;return Math.max(0,Math.min(100,Math.round((c-b)/(t-b)*100)));}
function indColor(p){return p>=85?'green':p>=60?'amber':'red';}
function allInds(p){return ['goal','outcome','output','activity'].reduce(function(a,k){return a.concat(p.logframe[k]||[]);},[]);}
function projProgress(p){var ix=allInds(p);if(!ix.length)return 0;return Math.round(ix.reduce(function(s,i){return s+indPct(i);},0)/ix.length);}

/* ---------- Dashboard ---------- */
function statusRollup(projs){var c={green:0,amber:0,red:0,gray:0};projs.forEach(function(p){allInds(p).forEach(function(i){var st=indStatus(p,i);c[st.color]=(c[st.color]||0)+1;});});c.total=c.green+c.amber+c.red+c.gray;return c;}
function statusRollupHTML(c,scope){
  var sym={green:'▲',amber:'◆',red:'▼',gray:'●'};
  var seg=function(cls,label){if(!c[cls]||!c.total)return '';var pct=c[cls]/c.total*100;return '<span class="seg '+cls+'" style="width:'+pct+'%" title="'+label+': '+c[cls]+' ('+Math.round(pct)+'%)">'+(pct>=11?c[cls]:'')+'</span>';};
  return '<div class="rollup-kpis"><div class="rk green"><div class="v">'+sym.green+' '+c.green+'</div><div class="l">On track</div></div><div class="rk amber"><div class="v">'+sym.amber+' '+c.amber+'</div><div class="l">At risk</div></div><div class="rk red"><div class="v">'+sym.red+' '+c.red+'</div><div class="l">Off track</div></div>'+(c.gray?'<div class="rk gray"><div class="v">'+sym.gray+' '+c.gray+'</div><div class="l">No data</div></div>':'')+'</div>'
    +'<div class="stackbar">'+seg('green','On track')+seg('amber','At risk')+seg('red','Off track')+seg('gray','No data')+'</div>'
    +'<div class="muted" style="font-size:12px;margin-top:7px">'+c.total+' indicator'+(c.total===1?'':'s')+' across '+(scope||'the portfolio')+'. Status reflects pace against expected-to-date. Hover a band for its share.</div>';
}
function viewDashboard(){
  var SP=scopedProjects();
  var totReach=SP.reduce(function(s,p){return s+(+p.reach||0);},0);
  var totBudget=SP.reduce(function(s,p){return s+(+p.budget||0);},0);
  var active=SP.filter(function(p){return p.status==='Active';}).length;
  var cards=SP.map(function(p){var pr=projProgress(p);var ns=notStarted(p);return '<div class="proj" data-open="'+p.id+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div class="name">'+esc(p.name)+'</div>'+statusPill(p.status)+'</div><div class="desc">'+esc(p.focus)+' · '+esc(p.location)+'</div>'+(ns?'<div class="muted" style="font-size:12px;margin:2px 0 8px">Planning — launches '+fmtDate(p.start)+'. No results recorded yet.</div>':'<div class="bar '+indColor(pr)+'" style="margin-bottom:6px"><span style="width:'+pr+'%"></span></div><div class="muted" style="font-size:12px">'+pr+'% avg indicator progress</div>')+'<div class="stats"><div class="stat"><div class="v">'+(+p.reach).toLocaleString('en-US')+'</div><div class="k">Reach</div></div><div class="stat"><div class="v">'+money(p.budget)+'</div><div class="k">Budget</div></div></div></div>';}).join('')||'<div class="empty">No projects in your view.</div>';
  // upcoming events/deadlines scoped to the user's projects + community
  var spIds={}; SP.forEach(function(p){spIds[p.id]=1;});
  var up=[];
  SP.forEach(function(p){ if(p.end) up.push({date:p.end,title:'Grant period ends',project:p.name,kind:'deadline'}); if(notStarted(p)&&p.start) up.push({date:p.start,title:'Project launches',project:p.name,kind:'launch'}); });
  getEvents().forEach(function(e){ if(e.scope==='community'||spIds[e.scope]){ up.push({date:e.date,title:e.title,project:e.scope==='community'?'Community':((projectById(e.scope)||{}).name||''),kind:e.kind}); } });
  up.forEach(function(n){n.days=daysFrom(n.date);});
  up=up.filter(function(n){return n.days>=0&&n.days<=60;}).sort(function(a,b){return a.days-b.days;}).slice(0,6);
  var upRows=up.map(function(n){return '<div class="cal-row">'+dateChip(n.date)+'<div class="cal-body"><div class="cal-title">'+esc(n.title)+' <span class="pill '+kindColor(n.kind)+'">'+esc(n.kind)+'</span> <span class="muted" style="font-size:12px">'+relDays(n.days)+'</span></div><div class="muted" style="font-size:12px">'+esc(n.project)+'</div></div></div>';}).join('')||'<div class="empty">Nothing scheduled in the next 60 days.</div>';
  var upcomingCard='<div class="card"><div class="card-h"><div><h3>Upcoming — Calendar</h3><p>Events, sessions, and reporting deadlines across your projects in the next 60 days.</p></div><span class="pill blue">'+up.length+' upcoming</span></div><div class="card-b">'+upRows+'</div></div>';
  var audit=getAudit().slice(0,6).map(function(a){return '<div class="ev"><span class="d"></span><div><div class="t">'+esc(a.action)+(a.object?' — '+esc(a.object):'')+'</div><div class="m">'+esc(a.user)+' · '+esc(a.date)+' '+esc(a.time)+(a.oldValue||a.newValue?' · '+esc(a.oldValue||'—')+' → '+esc(a.newValue||'—'):'')+'</div></div></div>';}).join('')||'<div class="empty">No activity recorded yet.</div>';
  return '<div class="page-head"><div><h1 class="page-title">Portfolio Dashboard</h1><p class="page-sub">'+scopeLabel()+' · La Porte County, Indiana</p></div></div>'
   +'<div class="grid g4" style="margin-bottom:18px"><div class="kpi"><div class="v">'+SP.length+'</div><div class="l">Projects</div></div><div class="kpi"><div class="v">'+active+'</div><div class="l">Active</div></div><div class="kpi"><div class="v">'+totReach.toLocaleString('en-US')+'</div><div class="l">Total Reach</div></div><div class="kpi"><div class="v">'+money(totBudget)+'</div><div class="l">Total Budget</div></div></div>'
   +'<div class="card"><div class="card-h"><div><h3>Indicator Performance</h3><p>Live red / amber / green roll-up across the indicators in your view.</p></div></div><div class="card-b">'+statusRollupHTML(statusRollup(SP),isHFL()?'the portfolio':'your projects')+'</div></div>'
   +upcomingCard
   +'<div class="card"><div class="card-h"><div><h3>Projects</h3><p>Select a project to open its full workspace.</p></div>'+(canManage()?'<button class="btn primary" data-act="new-project">+ New Project</button>':'')+'</div><div class="card-b"><div class="proj-grid">'+cards+'</div></div></div>'

/* ---------- Learning & Community ---------- */
function viewLearning(){
  var by={}; DATA.forEach(function(p){var f=p.focus; var b=by[f]=by[f]||{projects:0,reach:0,budget:0,orgs:{},sum:0,n:0}; b.projects++; b.reach+=+p.reach||0; b.budget+=+p.budget||0; p.orgs.forEach(function(o){b.orgs[o.name]=1;}); allInds(p).forEach(function(i){b.sum+=indPct(i);b.n++;}); });
  var focuses=Object.keys(by); var maxR=Math.max.apply(null,focuses.map(function(f){return by[f].reach;}).concat([1]));
  var bars=focuses.map(function(f){var h=Math.round(by[f].reach/maxR*100);return '<div class="cbar" style="height:'+Math.max(8,h)+'%"><div class="cv">'+by[f].reach.toLocaleString('en-US')+'</div><div class="cl">'+esc(f.split(' ')[0])+'</div></div>';}).join('');
  var cards=focuses.map(function(f){var b=by[f];var avg=b.n?Math.round(b.sum/b.n):0;var orgs=Object.keys(b.orgs);return '<div class="card"><div class="card-h"><div><h3>'+esc(f)+'</h3><p>Aggregate, privacy-protected learning across '+orgs.length+' organization'+(orgs.length===1?'':'s')+'.</p></div><span class="pill blue">Community Dashboard</span></div><div class="card-b"><div class="grid g4"><div class="kpi"><div class="v">'+b.projects+'</div><div class="l">Projects</div></div><div class="kpi"><div class="v">'+b.reach.toLocaleString('en-US')+'</div><div class="l">Total Reach</div><div class="s">Aggregate only — no individual records.</div></div><div class="kpi"><div class="v">'+money(b.budget)+'</div><div class="l">Combined Budget</div></div><div class="kpi"><div class="v">'+avg+'%</div><div class="l">Avg Progress</div><div class="bar '+indColor(avg)+'" style="margin-top:7px"><span style="width:'+avg+'%"></span></div></div></div><div class="grid g2 mt14"><div><div class="field"><label>Cross-organization participants</div>'+orgs.map(function(o){return '<span class="pill blue" style="margin:2px 4px 2px 0">'+esc(o)+'</span>';}).join('')+'</div><div class="help mb0"><b>Shared learning prompt:</b> What barriers and effective practices are showing up across partners in '+esc(f)+'? Convene partners to compare engagement and referral-completion approaches.</div></div></div></div>';}).join('');

  // ----- Collective contribution to the overall effort -----
  var totalReach=DATA.reduce(function(s,p){return s+(+p.reach||0);},0)||1;
  var totalBudget=DATA.reduce(function(s,p){return s+(+p.budget||0);},0);
  var contribRows=DATA.slice().sort(function(a,b){return (+b.reach||0)-(+a.reach||0);}).map(function(p){
    var rc=statusRollup([p]); var ns=notStarted(p); var pct=Math.round((+p.reach||0)/totalReach*100);
    var st = ns?'<span class="pill gray">Not started</span>': rc.red>0?'<span class="pill red">At risk</span>': rc.amber>0?'<span class="pill amber">Watch</span>': rc.green>0?'<span class="pill green">On track</span>':'<span class="pill gray">No data</span>';
    var mini='<div style="background:#eef2f7;border-radius:6px;height:8px;overflow:hidden;min-width:90px;max-width:160px"><span style="display:block;height:100%;width:'+pct+'%;background:var(--cp-blue)"></span></div><div class="muted" style="font-size:11px;margin-top:2px">'+pct+'% of portfolio reach</div>';
    return '<tr><td><b>'+esc(p.name)+'</b></td><td><span class="pill blue">'+esc(p.focus)+'</span></td><td><b>'+(+p.reach||0).toLocaleString('en-US')+'</b></td><td>'+mini+'</td><td>'+st+'</td></tr>';
  }).join('');
  var contribCard='<div class="card"><div class="card-h"><div><h3>Collective Contribution</h3><p>How each project adds to the portfolio’s overall reach, and where it stands today.</p></div><span class="pill blue">'+DATA.length+' projects · '+totalReach.toLocaleString('en-US')+' reached · '+money(totalBudget)+'</span></div><div class="card-b"><div class="tw"><table class="t"><thead><tr><th>Project</th><th>Focus area</th><th>Reach</th><th>Share of total</th><th>Status</th></tr></thead><tbody>'+contribRows+'</tbody></table></div></div></div>';

  // ----- Partner contribution matrix (cross-reference) -----

/* ---------- dispatch ---------- */
function dispatch(act, el){
  var p=project();
  switch(act){
    case 'new-project': return formProject(null);
    case 'lesson-new': return formLesson();
    case 'resource-add': return formResource();
    case 'resource-del': return resourceDel(el.dataset.id);
    case 'event-add': return formEvent(el.dataset.scope, el.dataset.kind);
    case 'event-del': return eventDel(el.dataset.id);
    case 'notif-toggle': return openNotifications();
    case 'go-back': return goBack();
    case 'nav-toggle': state.navOpen=!state.navOpen; render(); return;
    case 'edit-project': if(!isAdmin())return deny(); return formProject(p);
    case 'close-project': if(!isAdmin())return deny(); return closeProject(p);
    case 'add-ind': if(!canManage())return deny(); return formIndicator(p, el.dataset.lv, null);
    case 'edit-ind': if(!canManage())return deny(); return formIndicator(p, el.dataset.lv, el.dataset.id);
    case 'del-ind': if(!canManage())return deny(); return delIndicator(p, el.dataset.lv, el.dataset.id);
    case 'add-track': return formTracking(p, el.dataset.lv, el.dataset.id);
    case 'add-team': return formTeam(p, null);
    case 'edit-team': return formTeam(p, el.dataset.id);
    case 'del-team': if(!canManage())return deny(); return delTeam(p, el.dataset.id);
    case 'enroll-open': return enrollPanel(p);
    case 'enroll-sms': return sendEnroll(p,'SMS');
    case 'enroll-email': return sendEnroll(p,'Email');
    case 'enroll-cancel': $('enroll-area').innerHTML=''; return;
    case 'add-ben': return formBeneficiary(p);
    case 'del-ben': if(!canManage())return deny(); return delBeneficiary(p, el.dataset.id);
    case 'ben-sel-all': document.querySelectorAll('.ben-chk').forEach(function(c){c.checked=true;}); return updateBenCount();
    case 'ben-sel-none': document.querySelectorAll('.ben-chk').forEach(function(c){c.checked=false;}); return updateBenCount();
    case 'ben-export-sel': return benExportSel();
    case 'ben-remove-sel': return benRemoveSel();
    case 'del-doc': return delDoc(p, el.dataset.id);
    case 'validate-doc': return validateDoc(p, el.dataset.id);
    case 'return-doc': return returnDocModal(p, el.dataset.id);
    case 'report-template': return formReport(p);
    case 'report-draft': return reportAction(p, el.dataset.id, 'Draft', 'Saved draft');
    case 'report-submit': return reportAction(p, el.dataset.id, 'In Review', 'Submitted for review');
    case 'report-hfl': return reportAction(p, el.dataset.id, 'Sent to HFL', 'Sent to HFL');
    case 'report-archive': return reportAction(p, el.dataset.id, 'Archived', 'Archived');
    case 'report-history': return reportHistory(p, el.dataset.id);
    case 'view-doc': return openDocViewer(el.dataset.pid, el.dataset.id);
    case 'doc-download': return docDownload(el.dataset.pid, el.dataset.id);
    case 'doc-export': return docExport(el.dataset.pid, el.dataset.id);
    case 'doc-send': return docSend(el.dataset.pid, el.dataset.id);

    +qs.map(function(q){return '<div class="field"><label>'+esc(q.label)+'</label><input id="qt-'+q.label.replace(/\s/g,'_')+'" type="number" value="'+esc(i.qtargets[q.label]!=null?i.qtargets[q.label]:'')+'" placeholder="by '+esc(q.label)+'"></div>';}).join('')
    +'</div><div class="note">Final target for this indicator is <b>'+esc(i.target)+' '+esc(i.unit)+'</b>.</div>';

function seedDemoTargets(){
  try{ if(localStorage.getItem('commpact_demotgt_v2'))return; }catch(e){}

/* ============================================================
   AI HELPER (real model when running as a Claude artifact;
   graceful local fallback otherwise)
   ============================================================ */
function aiCall(system, prompt){
  var key=(getSettings().apiKey||'').trim();
  var headers={'Content-Type':'application/json'};
  if(key){ headers['x-api-key']=key; headers['anthropic-version']='2023-06-01'; headers['anthropic-dangerous-direct-browser-access']='true'; }
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:headers,
    body:JSON.stringify({model:'claude-sonnet-4-6', max_tokens:1024, system:system, messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d&&d.error)throw new Error(d.error.message||'API error');
    if(!d||!d.content)throw new Error('No content');
    var txt=d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim();
    if(!txt)throw new Error('Empty'); return txt;
  });
}
/* run AI; on any failure use fallback(). cb(text, usedAI) */
function aiOr(system, prompt, fallback, cb){
  var done=false; var to=setTimeout(function(){if(!done){done=true;cb(fallback(),false);}},12000);
  try{
    aiCall(system,prompt).then(function(t){if(done)return;done=true;clearTimeout(to);cb(t,true);})
      .catch(function(){if(done)return;done=true;clearTimeout(to);cb(fallback(),false);});
  }catch(e){if(!done){done=true;clearTimeout(to);cb(fallback(),false);}}
}
function spinner(t){return '<div class="ai-busy"><span class="spin"></span> '+esc(t||'Working with Claude…')+'</div>';}

/* ---- local fallbacks ---- */
function fbSummary(text){
  var sents=(text||'').replace(/\s+/g,' ').split(/(?<=[.!?])\s/).filter(function(s){return s.trim().length>15;});
  var pick=function(re){return sents.filter(function(s){return re.test(s);}).slice(0,3);};
  var succ=pick(/increase|achiev|improv|complet|exceed|reach|deliver|success|grew|gain/i);
  var chal=pick(/challeng|delay|barrier|difficult|short|gap|unable|risk|low |decline|concern/i);
  var rec =pick(/recommend|should|next|propose|suggest|plan to|will |need to|prioritiz/i);
  var sum = sents.slice(0,3).join(' ');
  return 'SUMMARY\n'+(sum||'No summary text available.')
    +'\n\nSUCCESSES\n'+(succ.length?succ.map(function(s){return '• '+s;}).join('\n'):'• Delivery proceeding against plan.')
    +'\n\nCHALLENGES\n'+(chal.length?chal.map(function(s){return '• '+s;}).join('\n'):'• No major challenges flagged in the text.')
    +'\n\nRECOMMENDATIONS\n'+(rec.length?rec.map(function(s){return '• '+s;}).join('\n'):'• Continue monitoring indicators and validate evidence next quarter.');
}
function fbImprove(text){
  var t=(text||'').trim(); if(!t)return 'Add content first, then use AI to strengthen it.';
  return t.replace(/\bgood\b/gi,'strong').replace(/\bbad\b/gi,'underperforming').replace(/\ba lot of\b/gi,'substantial')
    +'\n\n[Offline edit: connect to Claude for full MEAL-quality rewrite with evidence framing, disaggregation, and outcome language.]';
}
function fbTranslate(text,to){
  return '[Offline — connect to Claude for accurate '+to+' translation]\n\n'+(text||'');
}

/* ============================================================
   QUARTERLY TRACKING TABLE
   ============================================================ */
function quarters(p){
  var out=[]; if(!p.start)return out; var s=new Date(p.start+'T00:00:00'); var e=p.end?new Date(p.end+'T00:00:00'):new Date();
  var y=s.getFullYear(), q=Math.floor(s.getMonth()/3);
  var guard=0;
  while(guard++<40){var label='Q'+(q+1)+' '+y; out.push({label:label,year:y,q:q,start:new Date(y,q*3,1),end:new Date(y,q*3+3,0)}); if(y>e.getFullYear()||(y===e.getFullYear()&&q>=Math.floor(e.getMonth()/3))) break; q++; if(q>3){q=0;y++;}}
  return out;
}
function valueForQuarter(ind, qtr){
  var hit=null; (ind.tracking||[]).forEach(function(t){var d=new Date(t.date+'T00:00:00'); if(d>=qtr.start&&d<=qtr.end)hit=t.value;}); return hit;
}
function expectedToDate(p,i){
  var qs=quarters(p); var now=new Date(); var base=parseFloat(i.baseline), tgt=parseFloat(i.target);
  if(i.qtargets){ var val=null; qs.forEach(function(q){ if(q.start<=now && i.qtargets[q.label]!=null && i.qtargets[q.label]!=='') val=parseFloat(i.qtargets[q.label]); }); if(val!=null&&!isNaN(val)) return val; }
  var total=qs.length||1; var elapsed=0; qs.forEach(function(q){ if(q.end<=now) elapsed++; else if(q.start<=now&&now<=q.end) elapsed+=0.5; });
  var f=Math.max(0.0001, Math.min(1, elapsed/total));
  return base+(tgt-base)*f;
}
function indHasQTargets(i){ if(!i.qtargets)return false; return Object.keys(i.qtargets).some(function(k){return i.qtargets[k]!=null&&i.qtargets[k]!=='';}); }
function notStarted(p){var s=p.start?new Date(p.start+'T00:00:00'):null;return p.status==='Planning'||(s&&s>new Date());}
function indStatus(p,i){
  if(notStarted(p)) return {variance:null,expected:null,color:'gray',label:'Not started',explicit:false};
  var base=parseFloat(i.baseline), tgt=parseFloat(i.target), cur=parseFloat(i.current);
  if(isNaN(base)||isNaN(tgt)||isNaN(cur)||tgt===base) return {variance:null,expected:null,color:'gray',label:'n/a',explicit:false};
  var qs=quarters(p); var total=qs.length||1; var now=new Date(); var elapsed=0;
  qs.forEach(function(q){ if(q.end<=now) elapsed++; else if(q.start<=now&&now<=q.end) elapsed+=0.5; });
  var f=Math.max(0.0001, Math.min(1, elapsed/total));
  var expected=expectedToDate(p,i);
  var variance=cur-expected;
  var color,label;
  if(f>=1){ var pct=(cur-base)/(tgt-base); color=pct>=0.9?'green':pct>=0.7?'amber':'red'; label=pct>=0.9?'Met':pct>=0.7?'Partial':'Missed'; }
  else { var ratio=expected!==0?cur/expected:(cur>=expected?1:0); if(expected<=base){ var den=(expected-base); ratio=den?(cur-base)/den:1; } color=ratio>=0.9?'green':ratio>=0.7?'amber':'red'; label=ratio>=0.9?'On track':ratio>=0.7?'At risk':'Off track'; }
  return {variance:variance,expected:expected,color:color,label:label,explicit:indHasQTargets(i)};
}
function trackingTable(p){
  var qs=quarters(p); if(!qs.length)return '<div class="empty">Set project start and end dates to generate the quarterly tracking table.</div>';
  var levels=[['goal','Goal'],['outcome','Outcome'],['output','Output'],['activity','Activity']];
  var ncols=qs.length+6;
  var head='<tr><th>Indicator</th><th>Baseline</th><th>Target</th>'+qs.map(function(q){return '<th>'+esc(q.label)+'</th>';}).join('')+'<th>Total reach</th><th>Variance<div class="muted" style="font-weight:500;font-size:10px">vs expected</div></th><th>Status</th></tr>';
  var body='';
  levels.forEach(function(lv){
    var inds=p.logframe[lv[0]]||[]; if(!inds.length)return;
    body+='<tr class="trk-grouprow trk-'+lv[0]+'"><td colspan="'+ncols+'"><span class="lp '+lv[0]+'">'+lv[1]+'</span></td></tr>';
    inds.forEach(function(i){
      var st=indStatus(p,i);
      var vtxt=st.variance==null?'<span class="muted">—</span>':'<b>'+(st.variance>=0?'+':'−')+(Math.round(Math.abs(st.variance)*10)/10)+'</b>';
      body+='<tr><td><b>'+esc(i.name)+'</b><div class="muted" style="font-size:11px">'+esc(i.unit)+(canManage()?' · <a class="trk-tgt-link" data-act="set-qtargets" data-lv="'+lv[0]+'" data-id="'+i.id+'">set targets</a>':'')+'</div></td>'
        +'<td>'+esc(i.baseline)+'</td><td>'+esc(i.target)+'</td>'
        +qs.map(function(q){var val=valueForQuarter(i,q);var tg=(i.qtargets&&i.qtargets[q.label]!=null&&i.qtargets[q.label]!=='')?i.qtargets[q.label]:null;return '<td class="trk-cell" data-lv="'+lv[0]+'" data-id="'+i.id+'" data-q="'+q.label+'" title="Click to set actual'+(tg!=null?' · target '+esc(tg):'')+'">'+(val==null?'<span class="muted">—</span>':'<b>'+esc(val)+'</b>')+(tg!=null?'<div class="trk-tg">/ '+esc(tg)+'</div>':'')+'</td>';}).join('')
        +'<td><b>'+esc(i.current)+'</b></td>'
        +'<td class="trk-var '+st.color+'">'+vtxt+'</td>'
        +'<td><span class="pill '+st.color+'">'+st.label+'</span></td></tr>';
    });
  });
  if(!body)body='<tr><td colspan="'+ncols+'"><div class="empty">No indicators yet. Add an indicator and it appears here automatically.</div></td></tr>';
  return '<div class="tw"><table class="t trk-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>'
    +'<div class="trk-legend"><span class="pill green">On track</span> ≥90% of expected pace &nbsp;·&nbsp; <span class="pill amber">At risk</span> 70–89% &nbsp;·&nbsp; <span class="pill red">Off track</span> &lt;70%. &nbsp; <b>Variance</b> compares the latest actual against the value expected by now. Set <b>per-quarter targets</b> (the “set targets” link by each indicator) to make the expected value and variance exact; otherwise it uses a straight-line baseline→target estimate. Click any quarter cell to record an actual (Admin). New indicators appear here automatically.</div>';
}

/* ============================================================
   REPORT EDITOR (template with MEAL prompts + AI)
   ============================================================ */
var REPORT_TEMPLATE=[
  {key:'context',title:'Context & Reporting Period',prompt:'State the reporting period, project phase, and any context affecting delivery. Keep it factual.'},
  {key:'activities',title:'Activities Implemented',prompt:'List the main activities delivered this period. Tie each to an output indicator where possible.'},
  {key:'results',title:'Results Against Indicators',prompt:'Report actual vs target for key indicators. Disaggregate (e.g., by age bracket, ZIP) where relevant. Cite the data source.'},
  {key:'successes',title:'Successes & What Worked',prompt:'Describe outcomes achieved and why. Use evidence, not adjectives.'},
  {key:'challenges',title:'Challenges & Deviations',prompt:'Explain under-performance, delays, or risks, and how they were managed.'},
  {key:'lessons',title:'Lessons & Adaptation',prompt:'What did you learn, and what will you change next period? Reflect MEAL good practice.'},
  {key:'next',title:'Plans for Next Period',prompt:'State concrete next steps with owners and timelines.'}
];
function reportBody(r){return r.body||{};}
function openReportEditor(pid,id){
  var p=projectById(pid)||project(); var r=p.reports.find(function(x){return x.id===id;}); if(!r)return;
  state._editReport={pid:pid,id:id};
  var b=reportBody(r);
  var sections=REPORT_TEMPLATE.map(function(s){return '<div class="rep-sec"><div class="rep-sec-h"><div><b>'+esc(s.title)+'</b><div class="muted" style="font-size:12px">'+esc(s.prompt)+'</div></div></div>'
    +'<textarea class="rep-field" data-key="'+s.key+'" rows="3" placeholder="Type here…">'+esc(b[s.key]||'')+'</textarea></div>';}).join('');
  var ai='<div class="ai-bar"><span class="ai-tag">AI assist</span>'
    +'<button class="btn sm" data-act="rep-ai-improve">Improve writing</button>'
    +'<button class="btn sm" data-act="rep-ai-es">Translate → Spanish</button>'
    +'<button class="btn sm" data-act="rep-ai-en">Translate → English</button>'
    +'<button class="btn sm primary" data-act="rep-ai-summary">AI Summary</button></div>';
  var html=melTip('Strong MEAL reporting is evidence-based: state the result, compare it to the target, cite the data source, and explain the ‘why’ — not just adjectives like ‘successful’.')+'<div class="page-head"><div><h1 class="page-title">Edit Report</h1><p class="page-sub">'+esc(r.title)+' · '+esc(p.name)+' · '+esc(r.status)+'</p></div><div class="btn-row"><button class="btn" data-act="rep-close">Back to Reports</button><button class="btn good" data-act="rep-save">Save Draft</button></div></div>'
    +ai+'<div id="ai-out"></div><div class="card"><div class="card-b">'+sections+'</div></div>'
    +'<div class="card"><div class="card-h"><div><h3>AI Report Summary</h3><p>Summary, successes, challenges, and recommendations — auto-generated from your text.</p></div></div><div class="card-b" id="rep-summary">'+(r.summary?renderSummary(r.summary):'<div class="empty">Click <b>AI Summary</b> to generate.</div>')+'</div></div>';
  $('tabbody').innerHTML=html; wire();
}
function collectReportBody(){var b={};document.querySelectorAll('.rep-field').forEach(function(t){b[t.dataset.key]=t.value;});return b;}
function reportText(b){return REPORT_TEMPLATE.map(function(s){return s.title.toUpperCase()+'\n'+(b[s.key]||'')+'\n';}).join('\n');}
function renderSummary(s){return '<div class="grid g2"><div class="note"><b>Summary</b><br>'+esc(s.summary||'').replace(/\n/g,'<br>')+'</div><div class="note"><b>Successes</b><br>'+esc(s.successes||'').replace(/\n/g,'<br>')+'</div><div class="note"><b>Challenges</b><br>'+esc(s.challenges||'').replace(/\n/g,'<br>')+'</div><div class="note"><b>Recommendations</b><br>'+esc(s.recommendations||'').replace(/\n/g,'<br>')+'</div></div>';}
function parseSummary(txt){
  function grab(label,next){var re=new RegExp(label+'\\s*([\\s\\S]*?)(?='+next+'|$)','i');var m=txt.match(re);return m?m[1].replace(/^[:\-\s]+/,'').trim():'';}
  return {summary:grab('SUMMARY','SUCCESS'),successes:grab('SUCCESS\\w*','CHALLENG'),challenges:grab('CHALLENG\\w*','RECOMMEND'),recommendations:grab('RECOMMEND\\w*','$')};
}
function repAI(kind){
  var ctx=state._editReport; if(!ctx)return; var p=projectById(ctx.pid); var r=p.reports.find(function(x){return x.id===ctx.id;});
  var body=collectReportBody(); r.body=body; save();
  var text=reportText(body);
  if(kind==='summary'){
    $('rep-summary').innerHTML=spinner('Summarizing with Claude…');
    aiOr('You are a MEAL (monitoring, evaluation, accountability and learning) specialist. Summarize the project report. Reply in plain text with exactly four labelled sections: SUMMARY, SUCCESSES, CHALLENGES, RECOMMENDATIONS. Use short bullet points under each except SUMMARY.',
      'Summarize this project report:\n\n'+text,
      function(){return fbSummary(text);},
      function(out){var s=parseSummary(out); r.summary=s; save(); var el=$('rep-summary'); if(el)el.innerHTML=renderSummary(s); toast('AI summary ready.');});
    return;
  }
  var out=$('ai-out'); out.innerHTML=spinner();
  if(kind==='improve'){
    aiOr('You are a MEAL writing coach. Rewrite the text to reflect monitoring & evaluation good practice: evidence-based, specific, disaggregated where possible, outcome-focused, neutral tone. Keep the same section structure. Return only the rewritten text.',
      'Improve this report draft:\n\n'+text,
      function(){return fbImprove(text);},
      function(res,used){if(!out)return;out.innerHTML='<div class="card"><div class="card-h"><div><h3>Suggested rewrite '+(used?'':'(offline)')+'</h3><p>Copy what you want into the sections above.</p></div><button class="btn sm" data-act="rep-ai-dismiss">Dismiss</button></div><div class="card-b"><pre class="ai-pre">'+esc(res)+'</pre></div></div>'; wireAiOut();});
  } else if(kind==='es'||kind==='en'){
    var to=kind==='es'?'Spanish':'English';
    aiOr('You are a professional translator. Translate the report into '+to+', preserving section headings and meaning. Return only the translation.',
      'Translate to '+to+':\n\n'+text,
      function(){return fbTranslate(text,to);},
      function(res,used){if(!out)return;out.innerHTML='<div class="card"><div class="card-h"><div><h3>'+to+' translation '+(used?'':'(offline)')+'</h3></div><button class="btn sm" data-act="rep-ai-dismiss">Dismiss</button></div><div class="card-b"><pre class="ai-pre">'+esc(res)+'</pre></div></div>'; wireAiOut();});

var PIE_COLORS=['#2d7ff9','#38bdf8','#6d28d9','#f59e0b','#10b981','#ef4444','#8b5cf6','#0891b2','#ec4899','#14b8a6'];
function barChart(pairs,axis){if(!pairs.length)return '<div class="empty">No data.</div>';var max=Math.max.apply(null,pairs.map(function(p){return p.value;}).concat([1]));return '<div class="chart">'+pairs.map(function(p){return '<div class="cbar" style="height:'+Math.max(6,Math.round(p.value/max*100))+'%" title="'+esc(p.full||p.label)+': '+p.value+'"><div class="cv">'+p.value+'</div><div class="cl">'+esc(p.label)+'</div></div>';}).join('')+'</div>'+(axis?'<div class="axis">'+axis+'</div>':'');}
function pieSVG(pairs){pairs=pairs.filter(function(p){return p.value>0;});if(!pairs.length)return '<div class="empty">No data.</div>';var total=pairs.reduce(function(a,p){return a+p.value;},0)||1;var cx=90,cy=90,r=82,ang=-Math.PI/2;
  var paths=pairs.map(function(p,i){var frac=p.value/total;var a2=ang+frac*2*Math.PI;var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);var large=frac>0.5?1:0;var d=frac>=0.999?'M'+cx+' '+(cy-r)+' A'+r+' '+r+' 0 1 1 '+(cx-0.01)+' '+(cy-r)+' Z':'M'+cx+' '+cy+' L'+x1.toFixed(1)+' '+y1.toFixed(1)+' A'+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)+' Z';ang=a2;return '<path d="'+d+'" fill="'+PIE_COLORS[i%PIE_COLORS.length]+'" stroke="#fff" stroke-width="1.2"><title>'+esc(p.label)+': '+p.value+' ('+Math.round(frac*100)+'%)</title></path>';}).join('');
  var legend=pairs.map(function(p,i){return '<div class="pie-leg"><span style="background:'+PIE_COLORS[i%PIE_COLORS.length]+'"></span>'+esc(p.label)+' — <b>'+p.value+'</b> ('+Math.round(p.value/total*100)+'%)</div>';}).join('');
  return '<div class="pie-wrap"><svg viewBox="0 0 180 180" width="180" height="180" aria-label="pie chart">'+paths+'</svg><div class="pie-legend">'+legend+'</div></div>';}
function lineSVG(points){if(!points.length)return '<div class="empty">No data.</div>';var w=540,h=210,pad=34;var max=Math.max.apply(null,points.map(function(p){return p.value;}).concat([1]));var step=points.length>1?(w-2*pad)/(points.length-1):0;
  var pts=points.map(function(p,i){return [pad+i*step, h-pad-(p.value/max)*(h-2*pad)];});
  var grid=[0,0.25,0.5,0.75,1].map(function(g){var y=h-pad-g*(h-2*pad);return '<line x1="'+pad+'" y1="'+y.toFixed(0)+'" x2="'+(w-pad)+'" y2="'+y.toFixed(0)+'" stroke="#eef2f7"/><text x="'+(pad-6)+'" y="'+(y+3).toFixed(0)+'" font-size="9" text-anchor="end" fill="#94a3b8">'+Math.round(max*g)+'</text>';}).join('');
  var poly=pts.map(function(p){return p[0].toFixed(0)+','+p[1].toFixed(0);}).join(' ');
  var dots=pts.map(function(p,i){return '<circle cx="'+p[0].toFixed(0)+'" cy="'+p[1].toFixed(0)+'" r="4" fill="#2d7ff9"><title>'+esc(points[i].label)+': '+points[i].value+'</title></circle><text x="'+p[0].toFixed(0)+'" y="'+(p[1]-9).toFixed(0)+'" font-size="10" text-anchor="middle" fill="#334155">'+points[i].value+'</text>';}).join('');
  var labels=points.map(function(p,i){return '<text x="'+pts[i][0].toFixed(0)+'" y="'+(h-10)+'" font-size="10" text-anchor="middle" fill="#64748b">'+esc(p.label)+'</text>';}).join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="max-width:'+w+'px">'+grid+'<polyline points="'+poly+'" fill="none" stroke="#2d7ff9" stroke-width="2.5"/>'+dots+labels+'</svg>';}
function freqTable(pairs,h1){if(!pairs.length)return '<div class="empty">No data.</div>';var total=pairs.reduce(function(a,p){return a+p.value;},0)||1;return '<div class="tw"><table class="t"><thead><tr><th>'+esc(h1||'Category')+'</th><th>Frequency</th><th>%</th></tr></thead><tbody>'+pairs.map(function(p){return '<tr><td>'+esc(p.full||p.label)+'</td><td>'+p.value+'</td><td>'+Math.round(p.value/total*100)+'%</td></tr>';}).join('')+'<tr style="font-weight:700;background:#f8fbff"><td>Total</td><td>'+total+'</td><td>100%</td></tr></tbody></table></div>';}

    else {var qm={};inds.forEach(function(i){i.tracking.forEach(function(t){var d=new Date(t.date+'T00:00:00');var lab='Q'+(Math.floor(d.getMonth()/3)+1)+' '+d.getFullYear();qm[lab]=qm[lab]||{sum:0,n:0};qm[lab].sum+=+t.value||0;qm[lab].n++;});});var labs=Object.keys(qm).sort(function(a,b){function k(l){var pr=l.split(' ');return (+pr[1])*4+ +pr[0][1];}return k(a)-k(b);});series=labs.map(function(l){return {label:l,value:Math.round(qm[l].sum/qm[l].n)};});title='Quarterly trend (avg recorded actual)';if(q.chart==='pie')q.chart='line';}

  else {var s=anSelectedSurveys()[0];if(!s){host.innerHTML='<div class="card"><div class="card-h"><div><h3>Quantitative</h3></div></div><div class="card-b"><div class="help">Select a survey in the Surveys box above to chart its responses.</div></div></div>';bindControls();return;}var qi=+q.field||0;var counts={};(s.responses||[]).forEach(function(r){var a=r.answers[qi];counts[a]=(counts[a]||0)+1;});series=Object.keys(counts).sort().map(function(k){return {label:String(k),value:counts[k]};});title='Survey — '+s.title;axis='<b>X:</b> response value · <b>Y:</b> respondents';}

  if(ql.reports){scopedProjects().forEach(function(p){(p.reports||[]).forEach(function(r){if(r.body)Object.keys(r.body).forEach(function(k){if(r.body[k])texts.push('[Report] '+r.title+': '+r.body[k]);});});});}
  if(ql.surveys){var svs=anSelectedSurveys();(svs.length?svs:getSurveys()).forEach(function(s){(s.responses||[]).forEach(function(r){s.questions.forEach(function(q,i){if(q.type==='text'&&r.answers[i])texts.push('[Survey] '+r.answers[i]);});});});}

function anRunQual(){
  var texts=anQualSources(); if(!texts.length){toast('Select at least one source with text content.','error');return;}
  var a=QUAL_ANALYSES.filter(function(x){return x.key===ANALYTICS.qual.type;})[0]||QUAL_ANALYSES[0];
  var out=$('anqual-out'); if(out)out.innerHTML=spinner('Running '+a.label.toLowerCase()+' with Claude…');
  aiOr('You are a senior qualitative MEAL analyst. Task: '+a.sys+' Respond in clear plain text with short headers and bullets. Be specific and cite patterns; do not invent data beyond what is provided.',
    a.label+' of the following '+texts.length+' text items:\n\n'+texts.map(function(t){return '- '+t;}).join('\n'),
    function(){return fbQual(texts,a.label);},
    function(res,used){var o=$('anqual-out');if(!o)return;o.innerHTML='<div class="card" style="margin-top:12px"><div class="card-h"><div><h3>'+esc(a.label)+(used?'':' (offline)')+'</h3><p>'+texts.length+' text items analyzed</p></div></div><div class="card-b">'+renderQual(res)+'</div></div>';});

function qualColor(h){h=h.toLowerCase();
  if(/recommend|action|next step|priorit/.test(h))return 'green';
  if(/gap|issue|risk|concern|outlier|dissent|root|why|problem|barrier|missing|unmet/.test(h))return 'red';
  if(/sentiment|positive|negative|neutral/.test(h))return 'teal';
  if(/quote|voice|verbatim|item/.test(h))return 'purple';
  if(/theme|term|content|cod|category|frequenc/.test(h))return 'blue';
  if(/equity|inclusion|trend|change|compar|emerg|signal/.test(h))return 'amber';
  return 'slate';
}
function qualHL(s){return s.replace(/(\d+%?\s*positive)/gi,'<b style="color:#15803d">$1</b>').replace(/(\d+%?\s*negative)/gi,'<b style="color:#b91c1c">$1</b>').replace(/(\(\d+\s*mentions?\)|\(\d+%?\))/g,'<span class="qual-count">$1</span>');}
function renderQual(text){
  var lines=String(text).split('\n'); var out=''; var open=false;
  function close(){if(open){out+='</div></div>';open=false;}}
  function isHead(t){ if(t.length>48)return false; if(/^[•\-\*\d]/.test(t))return false; if(t.replace(/[^A-Za-z]/g,'').length<3)return false; if(t===t.toUpperCase()&&/[A-Z]/.test(t))return true; if(/:$/.test(t)&&/^[A-Z]/.test(t)&&t.split(' ').length<=6)return true; return false; }
  lines.forEach(function(ln){var t=ln.trim();if(!t)return;
    if(isHead(t)){close();var c=qualColor(t);out+='<div class="qual-block '+c+'"><div class="qual-head">'+esc(t.replace(/:$/,''))+'</div><div class="qual-body">';open=true;}
    else{ if(!open){out+='<div class="qual-block slate"><div class="qual-body">';open=true;} var bullet=/^[•\-\*\u2022]|^\d+[.)]/.test(t); var body=qualHL(esc(t.replace(/^[•\-\*\u2022]\s*/,''))); out+= bullet?'<div class="qual-li">'+body+'</div>':'<p>'+body+'</p>'; }
  });
  close();
  return '<div class="qual-grid">'+out+'</div>';
}
function fbQual(texts,label){
  var pos=/good|great|help|respect|improv|satisf|love|easy|better|excellent|positive/i, neg=/wait|hard|barrier|long|difficult|problem|bad|lack|delay|concern|poor/i;
  var p=0,n=0; texts.forEach(function(t){if(pos.test(t))p++; if(neg.test(t))n++;});
  var stop={the:1,and:1,that:1,this:1,with:1,have:1,from:1,were:1,they:1,their:1,about:1,which:1,would:1,there:1,what:1,when:1,your:1,more:1,been:1,than:1,them:1,report:1,survey:1};
  var words={}; texts.join(' ').toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).forEach(function(w){if(w.length>4&&!stop[w])words[w]=(words[w]||0)+1;});
  var top=Object.keys(words).sort(function(a,b){return words[b]-words[a];}).slice(0,6);
  return (label||'Qualitative analysis')+' (offline heuristic)\n\nTHEMES / TOP TERMS\n'+top.map(function(w){return '• '+w+' ('+words[w]+' mentions)';}).join('\n')
    +'\n\nSENTIMENT\n• ~'+Math.round(p/texts.length*100)+'% positive · ~'+Math.round(n/texts.length*100)+'% negative (keyword heuristic)'
    +'\n\nREPRESENTATIVE ITEMS\n'+texts.slice(0,3).map(function(t){return '• "'+t+'"';}).join('\n')
    +'\n\nNOTE\n• Connect to Claude (run inside Claude.ai) for full '+(label||'qualitative')+' depth.';
}

}

  $('modal-save').onclick=function(){var name=v('u-name');if(!name||!v('u-email')){toast('Name and email are required.','error');return;}var temp=genPass();var users=getUsers();users.unshift({id:uid('U'),name:name,email:v('u-email'),role:v('u-role'),status:'Invited',temp:temp,at:stamp()});saveUsers(users);logAudit('Created user',name,'',v('u-role'));closeModal();shareTempModal(name,temp,'created');render();};
}
function formUserEdit(id){
  if(!isAdmin())return deny();var users=getUsers();var u=users.find(function(x){return x.id===id;});if(!u)return;
  var ROLES=['HFL','Partner Admin','Project Staff'];
  var body=fsel('Role / permission level','u-role',ROLES,u.role)+fsel('Status','u-status',['Active','Invited','Suspended'],u.status)+'<div class="note">Permissions follow the role. See the permission matrix on the User Management page.</div>';
  modal('Permissions — '+u.name,body,'<button class="btn" data-close>Cancel</button><button class="btn primary" id="modal-save">Save</button>');
  $('modal-save').onclick=function(){u.role=v('u-role');u.status=v('u-status');saveUsers(users);logAudit('Updated user permissions',u.name,'',u.role);closeModal();toast('Permissions updated.');render();};
}
function shareTempModal(name,temp,verb){modal('Temporary password','<p>'+(verb==='reset'?'Password reset for ':'')+'<b>'+esc(name)+'</b></p><div class="note" style="margin-top:8px;font-size:15px">Temporary password: <code style="font-size:16px">'+esc(temp)+'</code></div><div class="help mt8">Share this securely. The user must change it at first sign-in.</div>','<button class="btn primary" data-close>Done</button>');}
function userReset(id){if(!isAdmin())return deny();var users=getUsers();var u=users.find(function(x){return x.id===id;});if(!u)return;confirmModal({title:'Reset password',message:'Reset password for '+u.name+'?',confirmLabel:'Reset',onConfirm:function(){u.temp=genPass();u.status='Invited';saveUsers(users);logAudit('Reset password',u.name);shareTempModal(u.name,u.temp,'reset');render();}});}
function userShare(id){if(!isAdmin())return deny();var users=getUsers();var u=users.find(function(x){return x.id===id;});if(!u)return;if(!u.temp){u.temp=genPass();saveUsers(users);}shareTempModal(u.name,u.temp,'share');}
function userDel(id){if(!isAdmin())return deny();var users=getUsers();var u=users.find(function(x){return x.id===id;});if(!u)return;confirmModal({title:'Delete user',message:'Delete '+u.name+'? They move to Trash and can be restored.',danger:true,confirmLabel:'Delete',onConfirm:function(){trashPush('User',u.name,{user:u});saveUsers(users.filter(function(x){return x.id!==id;}));logAudit('Deleted user',u.name);toast('User moved to Trash.');render();}});}

function getTrash(){try{return JSON.parse(localStorage.getItem('commpact_trash_v1')||'[]');}catch(e){return [];}}
function saveTrash(t){try{localStorage.setItem('commpact_trash_v1',JSON.stringify(t));}catch(e){}}
function trashPush(type,label,payload){var t=getTrash();t.unshift({id:uid('TR'),type:type,label:label,payload:payload,by:userName(),at:stamp()});saveTrash(t);}
function viewTrash(){
  if(!isAdmin())return adminDenied('Trash');
  var t=getTrash();
  var rows=t.map(function(x){return '<tr><td><span class="pill gray">'+esc(x.type)+'</span></td><td><b>'+esc(x.label)+'</b></td><td>'+esc(x.by)+'</td><td>'+esc(x.at)+'</td><td><div class="btn-row"><button class="btn sm good" data-act="trash-restore" data-id="'+x.id+'">Restore</button><button class="btn sm danger" data-act="trash-delete" data-id="'+x.id+'">Delete forever</button></div></td></tr>';}).join('')||'<tr><td colspan="5"><div class="empty">Trash is empty. Deleted documents, team members, beneficiaries, and users appear here and can be restored.</div></td></tr>';
  return '<div class="page-head"><div><h1 class="page-title">Trash</h1><p class="page-sub">Deleted items can be restored or permanently removed. Admin only.</p></div></div><div class="card"><div class="card-b"><div class="tw"><table class="t"><thead><tr><th>Type</th><th>Item</th><th>Deleted by</th><th>When</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
}
function trashRestore(id){
  if(!isAdmin())return deny();var t=getTrash();var item=t.find(function(x){return x.id===id;});if(!item)return;
  if(item.type==='Document'){var p=projectById(item.payload.pid);if(p)p.documents.unshift(item.payload.doc);save();}
  else if(item.type==='Team member'){var p=projectById(item.payload.pid);if(p)p.team.push(item.payload.member);save();}
  else if(item.type==='Beneficiary'){var p=projectById(item.payload.pid);if(p)p.beneficiaries.push(item.payload.ben);save();}
  else if(item.type==='User'){var u=getUsers();u.push(item.payload.user);saveUsers(u);}
  saveTrash(t.filter(function(x){return x.id!==id;}));logAudit('Restored '+item.type,item.label);toast(item.type+' restored.');render();
}
function trashDelete(id){if(!isAdmin())return deny();confirmModal({title:'Delete permanently',message:'Permanently delete this item? This cannot be undone.',danger:true,confirmLabel:'Delete permanently',onConfirm:function(){saveTrash(getTrash().filter(function(x){return x.id!==id;}));toast('Permanently deleted.');render();}});}


/* ===== MEL learning prompts ===== */

function saveResources(x){try{localStorage.setItem('commpact_resources_v1',JSON.stringify(x));}catch(e){}}
function seedResources(){return [
 {id:uid('RS'),title:'CommPact Indicator Reference Sheet (template)',type:'Template',url:'',desc:'Standard fields for defining an indicator: definition, calculation, baseline, target, frequency, and data source.',by:'Jordan Vega (HFL)',at:stamp()},
 {id:uid('RS'),title:'Core Humanitarian Standard — quick guide',type:'Guide',url:'',desc:'Nine commitments on quality and accountability to the people and communities you serve.',by:'Jordan Vega (HFL)',at:stamp()},
 {id:uid('RS'),title:'USDA Hunger Vital Sign food-security screener',type:'Instrument',url:'',desc:'Two-item validated screener used in Healthy Eating programs to flag food insecurity.',by:'Jordan Vega (HFL)',at:stamp()}
];}
function formResource(){ if(!isHFL())return deny();
  var body='<div class="fgrid">'+fin('Title','rs-title','')+fsel('Type','rs-type',['Guide','Template','Instrument','Link','Policy','Other'],'Guide')+'<div class="full">'+fin('Link (optional)','rs-url','','https://')+'</div><div class="full">'+fta('Description','rs-desc','')+'</div></div><div class="note">Resources are shared with all partners in the Learning &amp; Community space. Only HFL can add or remove them.</div>';

}
function resourceDel(id){ if(!isHFL())return deny(); confirmModal({title:'Remove resource',message:'Remove this resource?',danger:true,confirmLabel:'Remove',onConfirm:function(){ saveResources(getResources().filter(function(x){return x.id!==id;})); logAudit('Removed resource'); toast('Resource removed.'); render();}});}

/* ===== Events / sessions / workshops / deadlines ===== */
function getEvents(){try{var r=localStorage.getItem('commpact_events_v1');if(r)return JSON.parse(r);}catch(e){}var e=seedEvents();saveEvents(e);return e;}
function saveEvents(e){try{localStorage.setItem('commpact_events_v1',JSON.stringify(e));}catch(e2){}}
function seedEvents(){return [
 {id:uid('EV'),scope:'community',kind:'session',title:'Cross-partner MEL learning session',date:'2026-07-15',notes:'Compare engagement and referral-completion approaches across focus areas.',by:'Jordan Vega (HFL)',at:stamp()},
 {id:uid('EV'),scope:'community',kind:'event',title:'HFL Annual Partner Convening',date:'2026-09-22',notes:'All partners share results and plan Phase 2.',by:'Jordan Vega (HFL)',at:stamp()},
 {id:uid('EV'),scope:'community',kind:'workshop',title:'Lessons-Learned Workshop — Q2 2026',date:'2026-05-20',notes:'Key feedback: evening sessions and bilingual intake drive participation; transport remains the top barrier; warm handoffs need a single point of contact.',by:'Jordan Vega (HFL)',at:stamp()},
 {id:uid('EV'),scope:'fresh-plate',kind:'deadline',title:'Q2 2026 routine report due to HFL',date:'2026-07-10',notes:'Submit the quarterly routine report for validation.',by:'Aisha Patel',at:stamp()},
 {id:uid('EV'),scope:'trail-connect',kind:'event',title:'Trail opening community walk',date:'2026-06-28',notes:'Ribbon-cutting and guided walk on the new connected segment.',by:'Sara Lindqvist',at:stamp()}
];}
function kindColor(k){return {event:'blue',session:'cyan',workshop:'purple',deadline:'amber',launch:'gray'}[k]||'gray';}
function dateChip(dateStr){var d=new Date(dateStr+'T00:00:00');var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];return '<div class="datechip"><div class="dc-mo">'+mo+'</div><div class="dc-day">'+d.getDate()+'</div></div>';}
function daysFrom(dateStr){return Math.round((new Date(dateStr+'T00:00:00')-new Date())/86400000);}
function relDays(n){return n<0?Math.abs(n)+'d ago':n===0?'today':'in '+n+'d';}
function formEvent(scope,kind){ if(!canManage())return deny();
  var kinds = scope==='community'?['Event','Session','Workshop','Deadline']:['Event','Session','Deadline'];
  var def = kind?(kind.charAt(0).toUpperCase()+kind.slice(1)):'Event';
  var lbl = (kind==='workshop')?'Workshop feedback / key takeaways':'Notes';
  var body='<div class="fgrid">'+fin('Title','ev-title','')+fsel('Type','ev-kind',kinds,def)+fin('Date','ev-date',today(),'','date')+'<div class="full">'+fta(lbl,'ev-notes','')+'</div></div>';
  modal((scope==='community'?'Add Community ':'Add Project ')+((kind==='workshop')?'Workshop Feedback':'Item'),body,'<button class="btn" data-close>Cancel</button><button class="btn primary" id="modal-save">Save</button>');
  $('modal-save').onclick=function(){var t=v('ev-title');if(!t){toast('A title is required.','error');return;}var e=getEvents();e.push({id:uid('EV'),scope:scope,kind:v('ev-kind').toLowerCase(),title:t,date:v('ev-date'),notes:v('ev-notes'),by:userName(),at:stamp()});saveEvents(e);logAudit('Added '+v('ev-kind').toLowerCase(),t);closeModal();toast('Saved.');render();};
}
function eventDel(id){ if(!canManage())return deny(); confirmModal({title:'Remove item',message:'Remove this item?',danger:true,confirmLabel:'Remove',onConfirm:function(){ saveEvents(getEvents().filter(function(x){return x.id!==id;})); logAudit('Removed calendar item'); toast('Removed.'); render();}});}

/* ===== Notifications ===== */
function notifications(){
  var out=[];
  DATA.forEach(function(p){ if(p.end) out.push({date:p.end,title:'Grant period ends',project:p.name,kind:'deadline'}); if(notStarted(p)&&p.start) out.push({date:p.start,title:'Project launches',project:p.name,kind:'launch'}); });
  getEvents().forEach(function(e){var nm=e.scope==='community'?'Community':((projectById(e.scope)||{}).name||'');out.push({date:e.date,title:e.title,project:nm,kind:e.kind});});
  out.forEach(function(n){n.days=daysFrom(n.date);});
  return out.filter(function(n){return n.days>=-45 && n.days<=60;}).sort(function(a,b){return a.days-b.days;});
}
function notifCount(){return notifications().filter(function(n){return n.days<=14;}).length;}
function openNotifications(){
  var ns=notifications();
  var overdue=ns.filter(function(n){return n.days<0;});
  var soon=ns.filter(function(n){return n.days>=0&&n.days<=14;});
  var later=ns.filter(function(n){return n.days>14;});
  function row(n){return '<div class="ev"><span class="d" style="background:var(--cp-blue)"></span><div><div class="t">'+esc(n.title)+' <span class="pill '+kindColor(n.kind)+'">'+esc(n.kind)+'</span></div><div class="m muted" style="font-size:12px">'+esc(n.project)+' · '+fmtDate(n.date)+' · '+relDays(n.days)+'</div></div></div>';}
  function sec(t,arr){return arr.length?'<div class="field" style="margin-top:8px"><label>'+t+'</label></div>'+arr.map(row).join(''):'';}
  var body=(ns.length?(sec('Overdue',overdue)+sec('Next 14 days',soon)+sec('Later',later)):'<div class="empty">No upcoming deadlines or events.</div>');
  modal('Notifications', body, '<button class="btn primary" data-close>Close</button>');
}

/* ===== Project calendar tab ===== */
function projectDeadlines(p){
  var auto=[];
  if(p.start&&notStarted(p)) auto.push({id:'auto-launch',auto:true,kind:'event',title:'Project launches',date:p.start,notes:'Scheduled start of delivery.'});
  if(p.end) auto.push({id:'auto-end',auto:true,kind:'deadline',title:'Grant period ends',date:p.end,notes:'Final reporting and closeout.'});
  var qs=quarters(p); var now=new Date(); var nextQ=qs.filter(function(q){return q.end>=now;})[0];
  if(nextQ) auto.push({id:'auto-q',auto:true,kind:'deadline',title:'Quarterly actuals due ('+nextQ.label+')',date:nextQ.end.toISOString().slice(0,10),notes:'Record indicator actuals for the period.'});
  return auto;
}
function tabCalendar(p){
  var manual=getEvents().filter(function(e){return e.scope===p.id;});
  var items=manual.concat(projectDeadlines(p));
  items.forEach(function(i){i.days=daysFrom(i.date);});
  items.sort(function(a,b){return a.days-b.days;});
  var upcoming=items.filter(function(i){return i.days>=0;});
  var past=items.filter(function(i){return i.days<0;});
  function row(i){return '<div class="cal-row">'+dateChip(i.date)+'<div class="cal-body"><div class="cal-title">'+esc(i.title)+' <span class="pill '+kindColor(i.kind)+'">'+esc(i.kind)+'</span>'+(i.auto?' <span class="pill gray">auto</span>':'')+' <span class="muted" style="font-size:12px">'+relDays(i.days)+'</span></div>'+(i.notes?'<div class="muted" style="font-size:13px;margin-top:3px">'+esc(i.notes)+'</div>':'')+'</div>'+(!i.auto&&canManage()?'<button class="btn sm danger" data-act="event-del" data-id="'+i.id+'">Remove</button>':'')+'</div>';}
  return melTip('A project calendar keeps reporting deadlines and data-collection windows visible so monitoring stays on schedule. “Auto” items are derived from the grant dates and your quarterly periodicity, and they also feed the notification bell.')
   +'<div class="card"><div class="card-h"><div><h3>Calendar — Events &amp; Deadlines</h3><p>Sessions, events, and reporting deadlines for '+esc(p.name)+'.</p></div>'+(canManage()?'<button class="btn primary" data-act="event-add" data-scope="'+p.id+'">+ Add Event</button>':'')+'</div><div class="card-b">'
   +'<div class="field"><label>Upcoming</label></div>'+(upcoming.length?upcoming.map(row).join(''):'<div class="empty">Nothing scheduled ahead.</div>')
   +(past.length?'<div class="field" style="margin-top:14px"><label>Past</label></div>'+past.map(row).join(''):'')
   +'</div></div>';
}
